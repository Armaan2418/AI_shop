<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ava AI Assistant</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: linear-gradient(135deg, #eef2f3 0%, #8e9eab 100%); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
        }

        #chat-container { 
            width: 100%; 
            max-width: 480px; 
            height: 85vh; 
            background: white; 
            border-radius: 20px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.2); 
            display: flex; 
            flex-direction: column; 
            overflow: hidden;
        }

        #chat-header {
            padding: 20px;
            background: #007bff;
            color: white;
            text-align: center;
            font-size: 1.2em;
            font-weight: bold;
            letter-spacing: 1px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        #chat-box { 
            flex: 1; 
            overflow-y: auto; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
            background: #f9f9f9;
        }

        .message { 
            padding: 12px 18px; 
            border-radius: 18px; 
            max-width: 85%; 
            font-size: 0.95em; 
            line-height: 1.5;
            word-wrap: break-word;
            position: relative;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .user-msg { 
            align-self: flex-end; 
            background: #007bff; 
            color: white; 
            border-bottom-right-radius: 2px; 
        }

        .bot-msg { 
            align-self: flex-start; 
            background: #ffffff; 
            color: #333; 
            border: 1px solid #e0e0e0;
            border-bottom-left-radius: 2px; 
        }

        /* Markdown Styling inside messages */
        .bot-msg p { margin-bottom: 8px; }
        .bot-msg code { background: #eee; padding: 2px 4px; border-radius: 4px; font-family: 'Courier New', Courier, monospace; }
        .bot-msg pre { background: #2d2d2d; color: white; padding: 10px; border-radius: 10px; overflow-x: auto; margin: 10px 0; }

        #input-area { 
            display: flex; 
            padding: 20px; 
            background: white;
            border-top: 1px solid #eee;
        }

        #user-input { 
            flex: 1; 
            padding: 12px 20px; 
            border: 1px solid #ddd; 
            border-radius: 30px; 
            outline: none; 
            font-size: 1em;
            transition: 0.3s;
        }

        #user-input:focus { border-color: #007bff; box-shadow: 0 0 5px rgba(0,123,255,0.2); }

        button { 
            padding: 10px 25px; 
            margin-left: 10px; 
            background: #007bff; 
            color: white; 
            border: none; 
            border-radius: 30px; 
            cursor: pointer; 
            font-weight: 600;
            transition: 0.3s;
        }

        button:hover { background: #0056b3; transform: scale(1.05); }

        .typing { 
            font-size: 0.8em; 
            color: #888; 
            margin-left: 20px; 
            margin-bottom: 10px; 
            display: none; 
        }
    </style>
</head>
<body>

<div id="chat-container">
    <div id="chat-header">AVA AI</div>
    <div id="chat-box"></div>
    <div id="typing-indicator" class="typing">Ava is typing...</div>
    <div id="input-area">
        <input type="text" id="user-input" placeholder="Message Ava..." autocomplete="off">
        <button id="send-btn">Send</button>
    </div>
</div>

<script>
    const inputField = document.getElementById("user-input");
    const chatBox = document.getElementById("chat-box");
    const sendBtn = document.getElementById("send-btn");
    const typingIndicator = document.getElementById("typing-indicator");

    // Function to add a message to the UI
    function appendMessage(role, text) {
        const msgDiv = document.createElement("div");
        msgDiv.className = `message ${role}-msg`;
        
        if (role === 'bot') {
            msgDiv.innerHTML = marked.parse(text);
        } else {
            msgDiv.innerText = text;
        }
        
        chatBox.appendChild(msgDiv);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    async function sendMessage() {
        const message = inputField.value.trim();
        if (!message) return;

        // 1. Show User Message
        appendMessage('user', message);
        inputField.value = "";
        
        // 2. Show Typing Indicator
        typingIndicator.style.display = "block";
        chatBox.scrollTop = chatBox.scrollHeight;

        try {
            // 3. Request to Backend
            const response = await fetch("/get", {
                method: "POST",
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ msg: message })
            });
            
            const data = await response.json();

            // 4. Show Bot Response
            appendMessage('bot', data.response);
        } catch (error) {
            appendMessage('bot', "⚠️ Error: I'm having trouble connecting to the server. Is `app.py` running?");
        }

        typingIndicator.style.display = "none";
    }

    // Event Listeners
    sendBtn.addEventListener("click", sendMessage);
    inputField.addEventListener("keypress", (e) => {
        if (e.key === "Enter") sendMessage();
    });

    // 5. AUTO-WELCOME ON LOAD
window.onload = () => {
    inputField.focus();
    
    // The new sugarcoated introduction
    const welcomeText = "✨ **Welcome to ai-shop!** ✨\n\n" +
                        "Hey there, lovely! I'm **Ava**, your personal shopping companion crafted with love by **Prachi**. " +
                        "I'm here to make your experience absolutely wonderful. Whether you're looking for the perfect gift, " +
                        "need a stylish product suggestion, or just want to explore our latest collection, I've got you covered. " +
                        "\n\nHow can I help you find something special today? 💖";
                        
    appendMessage('bot', welcomeText);
};
</script>

</body>
</html>
